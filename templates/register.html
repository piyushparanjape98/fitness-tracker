{% extends "base.html" %}
{% block title %}Register – FitTrack{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h1 class="auth-title">⚡ FitTrack</h1>
        <p class="auth-sub">Create your account — we'll calculate everything for you</p>

        <form method="POST">
            <!-- Account -->
            <div class="onboard-section">
                <div class="onboard-section-title">Account</div>
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" placeholder="Choose a username" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" placeholder="Create a password" required>
                </div>
            </div>

            <!-- Body stats -->
            <div class="onboard-section">
                <div class="onboard-section-title">Body Stats</div>
                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label">Gender</label>
                        <select name="gender">
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Age</label>
                        <input type="number" name="age" value="25" min="10" max="120">
                    </div>
                </div>
                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label">Height (cm)</label>
                        <input type="number" name="height" value="170" min="100" max="250">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Weight (kg)</label>
                        <input type="number" name="weight" value="70" min="30" max="300" step="0.1">
                    </div>
                </div>
            </div>

            <!-- Goal -->
            <div class="onboard-section">
                <div class="onboard-section-title">Your Goal</div>
                <div class="form-group">
                    <label class="form-label">Fitness Goal</label>
                    <select name="goal">
                        <option value="maintain">Maintain Weight</option>
                        <option value="lose">Lose Weight</option>
                        <option value="gain">Gain Weight / Muscle</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Activity Level</label>
                    <select name="activity_level">
                        <option value="sedentary">Sedentary (desk job, no exercise)</option>
                        <option value="light">Light (1–2x/week)</option>
                        <option value="moderate" selected>Moderate (3–4x/week)</option>
                        <option value="active">Active (5–6x/week)</option>
                        <option value="very_active">Very Active (daily training)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Goal Timeline (weeks)</label>
                    <input type="number" name="goal_weeks" value="12" min="2" max="104"
                           placeholder="e.g. 12 weeks">
                    <small class="form-hint">How many weeks to achieve your goal?</small>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Create Account →</button>
        </form>

        <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
    </div>
</div>
{% endblock %}
